cv:
  name: Chunzhuo Zhang
  label: AI4Bio Researcher
  email: zhangchunzhuo@aaib.pku.edu.cn
  location: ""
  image: ""
  summary: Researcher working at the intersection of AI4Bio, bioinformatics, and machine learning. Currently focused on single-cell foundation models and multi-modal fusion for virtual cell modeling.

  sections:
    Education:
      - institution: Wageningen University & Research
        location: Wageningen, Netherlands
        url: https://www.wur.nl/
        area: Bioinformatics
        studyType: M.Sc.
        start_date: 2022-09
        end_date: 2024-08
        score: "GPA: 7.5/10"
        courses: "Computational Biology (8.5/10), Deep Learning (8/10), Genomics (8/10), Advanced Statistics (8/10), Machine Learning (7.5/10), Molecular Systems Biology (7.5/10), Software Engineering (7.5/10)"
        highlights:
          - "**Protein structure & sequence embeddings (sgBERT, gBERT):** combined protein structure and sequence via attention to obtain protein embeddings; preliminary exploration of multi-modal fusion. [ChunZhuo/sgBERT](https://github.com/ChunZhuo/sgBERT)"
          - "**Protein–protein interface false-positive prediction:** extended DeepRank-GNN with an equivariant graph neural network using harmonic functions; benchmarked against HADDOCK, classical ML, and GNN baselines on the alanine-scanning task. [ChunZhuo/SEGIN](https://github.com/ChunZhuo/SEGIN)"
          - "Coursework: sequence assembly, differential gene expression, protein domain analysis, gene regulatory network analysis; Java software development (parking-lot entry system)."

      - institution: Northwest A&F University (NWAFU)
        location: Yangling, China
        area: Horticulture
        studyType: B.Sc.
        start_date: 2018-09
        end_date: 2022-07
        score: "GPA: 3.51"
        courses: "Advanced Mathematics (91/100), Linear Algebra (94/100), Probability Theory (92/100), Fundamental Biochemistry (91/100), Organic Chemistry (94/100)"
        highlights:
          - Kiwifruit shoot-tip cryotherapy for virus elimination (RT-PCR, plant tissue culture).

    Experience:
      - company: Research Institute
        position: Biological Foundation Model Design
        start_date: 2024-10
        summary: Designing single-cell foundation models and exploring multi-modal fusion for virtual cell modeling.
        highlights:
          - "**Single-cell foundation model (53M / 300M / 600M / 2B):** in-context learning with observation and perturbation data; group-level cell modeling. From data preprocessing through architecture design to downstream benchmarking (based on scGPT); outperforms scGPT, Transcriptformer, and UCE."
          - "Explored scaling laws on single-cell data."
          - "Implementation in PyTorch → PyTorch Lightning; attention acceleration via FlashAttention / FlexAttention; custom loss and multi-classification heads."
          - "Built a multi-task downstream evaluation pipeline (batch-effect correction, cell classification, perturbation prediction) and designed new tasks for single-cell foundation models."
          - "Distributed training: FSDP, data parallelism, activation checkpointing."
          - "Mentored interns to deliver independent projects."
          - "**BindCraft protein design:** designed antigen ligands with constrained binding sites and generated binders in collaboration with the experimental team; ~5% of designs showed strong binding affinity."

