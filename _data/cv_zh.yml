        highlights:
          - "**蛋白质结构与序列嵌入 (sgBERT, gBERT)：** 通过注意力机制融合蛋白质结构与序列信息，获得蛋白质表示；初步探索多模态融合。[ChunZhuo/sgBERT](https://github.com/ChunZhuo/sgBERT)"
